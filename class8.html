  <style>
    :root {

      --line: rgba(255, 255, 255, 0.2);
      --text: #eaf8ec;
      --muted: #c7e5cb;
      --accent: #8be58f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(180deg, var(--bg2), var(--bg));
      color: var(--text);
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }
    .topbar {
      border-bottom: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.2);
      padding: 12px 14px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-right: auto;
    }
    .hint {
      color: var(--muted);
      font-size: 0.82rem;
    }
    .layout {
      display: grid;
      grid-template-columns: 250px 1fr;
      min-height: 0;
    }
    .sidebar {
      border-right: 1px solid var(--line);
      background: rgba(0, 0, 0, 0.18);
      padding: 12px;
      overflow: auto;
    }
    .nav-btn {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      padding: 10px 12px;
      margin-bottom: 8px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .nav-btn:hover,
    .nav-btn.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(139, 229, 143, 0.25) inset;
      background: rgba(139, 229, 143, 0.12);
    }
    .viewer {
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
    }
    .viewer-meta {
      border-bottom: 1px solid var(--line);
      padding: 10px 14px;
      font-size: 0.84rem;
      color: var(--muted);
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    .viewer-meta strong {
      color: var(--text);
      font-size: 0.9rem;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
    }
    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }
      .sidebar {
        border-right: 0;
        border-bottom: 1px solid var(--line);
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 8px;
      }
      .nav-btn {
        margin-bottom: 0;
      }
    }
  </style>
</head>

    const pageById = Object.fromEntries(pages.map((p) => [p.id, p]));
    const sidebar = document.getElementById('sidebar');
    const viewer = document.getElementById('viewer');
    const currentTitle = document.getElementById('currentTitle');
    const currentFile = document.getElementById('currentFile');

    function setActiveButton(id) {
      document.querySelectorAll('.nav-btn').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.id === id);
      });
    }

    function showPage(id, pushHash = true) {
      const page = pageById[id] || pages[0];
      viewer.src = 'data:text/html;charset=utf-8;base64,' + page.b64;
      currentTitle.textContent = page.title;
      currentFile.textContent = 'Source: ' + page.file;
      setActiveButton(page.id);
      if (pushHash) {
        window.location.hash = page.id;
      }
    }

    pages.forEach((page) => {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'nav-btn';
      button.dataset.id = page.id;
      button.textContent = page.title;
      button.addEventListener('click', () => showPage(page.id));
      sidebar.appendChild(button);
    });

    window.addEventListener('message', (event) => {
      const payload = event.data;
      if (!payload || payload.type !== 'openPackagePage') return;
      if (pageById[payload.id]) {
        showPage(payload.id);
      }
    });

    const initialId = window.location.hash ? window.location.hash.slice(1) : pages[0].id;
    showPage(initialId, false);

    window.addEventListener('hashchange', () => {
      const id = window.location.hash.slice(1);
      if (id) {
        showPage(id, false);
      }
    });
  </script>
