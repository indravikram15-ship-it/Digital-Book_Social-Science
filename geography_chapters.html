<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resources | Chapter Tabs</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap');

        :root {
            --bg1: #06120b;
            --bg2: #173726;
            --line: rgba(255, 255, 255, 0.2);
            --accent: #8be58f;
            --card: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            color: white;
            background: radial-gradient(circle at 40% 10%, var(--bg2) 0%, var(--bg1) 70%);
            overflow-x: hidden;
        }

        .page {
            max-width: 980px;
            margin: 0 auto;
            padding: 36px 20px 64px;
        }

        h1 {
            margin: 0;
            text-align: center;
            font-family: 'Cinzel', serif;
            color: var(--accent);
            letter-spacing: 0.04em;
            text-shadow: 0 0 24px rgba(139, 229, 143, 0.32);
        }

        .subtitle {
            text-align: center;
            margin: 10px 0 28px;
            opacity: 0.86;
        }

        .tabs {
            display: grid;
            gap: 14px;
            max-width: 760px;
            margin: 0 auto 20px;
        }

        .tab-btn {
            border: 1px solid var(--line);
            background: linear-gradient(120deg, rgba(255, 255, 255, 0.08), rgba(139, 229, 143, 0.14));
            color: #fff;
            border-radius: 20px;
            padding: 20px 22px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 14px;
            text-align: left;
            box-shadow: 0 14px 34px rgba(0, 0, 0, 0.28);
        }

        .tab-btn.active {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px rgba(139, 229, 143, 0.45), 0 20px 44px rgba(0, 0, 0, 0.35), 0 0 30px rgba(139, 229, 143, 0.25);
        }

        .tab-icon {
            min-width: 70px;
            height: 70px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-size: 2.2rem;
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.38);
            box-shadow: inset 0 -8px 16px rgba(0, 0, 0, 0.28), 0 10px 24px rgba(0, 0, 0, 0.3), 0 0 16px rgba(255, 255, 255, 0.15);
        }

        .panel {
            border: 1px solid var(--line);
            border-radius: 20px;
            padding: 24px;
            background: rgba(8, 22, 14, 0.78);
            box-shadow: 0 0 0 1px rgba(139, 229, 143, 0.32), 0 0 40px rgba(139, 229, 143, 0.18);
        }

        .panel h2 {
            margin-top: 0;
            color: var(--accent);
            font-family: 'Cinzel', serif;
        }

        .note {
            padding: 14px 16px;
            border-left: 4px solid var(--accent);
            border-radius: 8px;
            background: rgba(139, 229, 143, 0.12);
        }

        .tab-btn {
            cursor: default;
        }

        .tab-label {
            flex: 1;
        }

        .back-dashboard-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: #0b1f12;
            font-weight: 700;
            font-size: 0.86rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            padding: 10px 16px;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            background: linear-gradient(135deg, #b9f2bc, #8be58f);
            box-shadow: 0 8px 22px rgba(139, 229, 143, 0.4), 0 0 22px rgba(139, 229, 143, 0.5);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-bottom: 16px;
        }

        .back-dashboard-btn:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 12px 28px rgba(139, 229, 143, 0.5), 0 0 30px rgba(139, 229, 143, 0.65);
        }

        .enter-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 10px 22px;
            border-radius: 50px;
            background: linear-gradient(135deg, #2d8c32, #8be58f);
            color: #06120b;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            text-decoration: none;
            letter-spacing: 0.04em;
            box-shadow: 0 4px 18px rgba(139, 229, 143, 0.4), 0 0 14px rgba(139, 229, 143, 0.2);
            transition: transform 0.18s ease, box-shadow 0.18s ease;
            white-space: nowrap;
        }

        .enter-btn:hover {
            transform: translateY(-2px) scale(1.04);
            box-shadow: 0 6px 24px rgba(139, 229, 143, 0.55), 0 0 20px rgba(139, 229, 143, 0.35);
        }

        .chatbot-fab {
            position: fixed;
            right: 20px;
            bottom: 20px;
            width: 64px;
            height: 64px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.35);
            background: radial-gradient(circle at 30% 30%, #ffe6a8, #ffc04d 62%, #e59225 100%);
            box-shadow: 0 16px 28px rgba(0, 0, 0, 0.3), 0 0 26px rgba(255, 192, 77, 0.36);
            color: #2b1c00;
            font-size: 1.9rem;
            cursor: pointer;
            z-index: 20;
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .chatbot-fab:hover {
            transform: translateY(-2px) scale(1.04);
            box-shadow: 0 20px 34px rgba(0, 0, 0, 0.35), 0 0 34px rgba(255, 192, 77, 0.5);
        }
    </style>
    <link rel="stylesheet" href="assets/responsive.css">
</head>
<body>

<main class="page">
    <a class="back-dashboard-btn" href="dashboard.html">&#8592; Back to Dashboard</a>
    <h1>Resources</h1>
    <p class="subtitle">Explore the chapter for this section.</p>

    <section class="tabs" aria-label="Resources chapter tabs">
        <div class="tab-btn active">
            <span class="tab-icon" aria-hidden="true">&#x1F33F;</span>
            <span class="tab-label">Chapter: Natural Resources and Their Use</span>
            <a class="enter-btn" href="natural_resources.html">Enter &#8594;</a>
        </div>
    </section>

    <section class="panel" id="natural-resources">
        <h2>Natural Resources and Their Use</h2>
        <p class="note">This chapter focuses on types of natural resources and how responsible use supports sustainable development.</p>
    </section>
</main>

<a class="chatbot-fab" href="dashboard.html?openBirbal=1" aria-label="Ask Birbal" title="Ask Birbal">&#x1F916;</a>

<script src="assets/chatbot-widget.js"></script>
</body>
</html>
